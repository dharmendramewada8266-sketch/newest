[build]
  publish = "."

[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/worker"
  to = "/worker-new.html"
  status = 200

[[redirects]]
  from = "/jobs"
  to = "/jobs.html"
  status = 200

[[redirects]]
  from = "/contractor"
  to = "/contractor-fixed.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
